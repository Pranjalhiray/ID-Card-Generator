<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Admin Login – ID Card System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0f3460;--dark:#0a0a1a;--accent:#e94560;--accent2:#c0392b;--white:#fff;--muted:#94a3b8}
body{font-family:'DM Sans',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:fixed;top:-30%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(233,69,96,.12) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(15,52,96,.4) 0%,transparent 70%);pointer-events:none}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;animation:slideUp .5s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 24px rgba(233,69,96,.4)}
.logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white)}
.logo p{font-size:13px;color:var(--muted);margin-top:4px}
.badge{display:inline-block;background:rgba(233,69,96,.2);color:var(--accent);border:1px solid rgba(233,69,96,.3);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:1px;margin-top:8px}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px}
.alert-danger{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3)}
.alert-success{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(22,163,74,.3)}
.form-group{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:500;color:#cbd5e1;margin-bottom:8px}
.input-wrap{position:relative}
.input-wrap span{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
input{width:100%;padding:13px 14px 13px 42px;border:1px solid rgba(255,255,255,.1);border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;background:rgba(255,255,255,.05);color:var(--white)}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(233,69,96,.15)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:4px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(233,69,96,.4)}
.links{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
.links a{color:var(--accent);text-decoration:none;font-weight:500}
.links a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h1>Admin Portal</h1>
    <p>ID Card Management System</p>
    <span class="badge">RESTRICTED ACCESS</span>
  </div>

  <div th:if="${param.error}" class="alert alert-danger">❌ Invalid admin credentials.</div>
  <div th:if="${param.logout}" class="alert alert-success">✅ Logged out successfully.</div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label>Admin Email</label>
      <div class="input-wrap"><span>✉️</span>
        <input type="email" name="username" placeholder="admin@example.com" required autofocus/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap"><span>🔑</span>
        <input type="password" name="password" placeholder="Enter admin password" required/>
      </div>
    </div>
    <button type="submit" class="btn">Access Admin Panel →</button>
  </form>

  <div class="links" style="margin-top:24px">
    Not an admin? <a th:href="@{/login}">Student Login</a>
  </div>
</div>
</body>
</html>
