<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Register – ID Card System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0f3460;--accent:#00b4d8;--accent2:#0077b6;--bg:#f0f4f8;--white:#fff;--text:#1a1a2e;--muted:#64748b;--error:#dc2626}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;top:-40%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(0,180,216,.12) 0%,transparent 70%);pointer-events:none}
.card{background:var(--white);border-radius:24px;padding:48px 44px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.1);animation:slideUp .5s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--navy),var(--accent));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px}
.logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text)}
.logo p{font-size:13px;color:var(--muted);margin-top:4px}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px}
.alert-danger{background:#fef2f2;color:var(--error);border:1px solid #fecaca}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:7px}
.input-wrap{position:relative}
.input-wrap span{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
input{width:100%;padding:12px 13px 12px 40px;border:2px solid #e2e8f0;border-radius:11px;font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;background:#fafafa;color:var(--text)}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,180,216,.1);background:#fff}
.field-error{font-size:12px;color:var(--error);margin-top:5px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--navy),var(--accent2));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,119,182,.35)}
.links{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.links a{color:var(--accent2);text-decoration:none;font-weight:500}
.info-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:12px 16px;font-size:12.5px;color:#0369a1;margin-bottom:24px}
.section-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <h1>Create Account</h1>
    <p>Register to get your ID card</p>
  </div>

  <div class="info-box">
    ℹ️ After registration, an admin will review and approve your account before your ID card is generated.
  </div>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <form th:action="@{/register}" th:object="${user}" method="post">
    <div class="section-label">Account Information</div>
    <div class="form-group">
      <label>Full Name *</label>
      <div class="input-wrap"><span>👤</span>
        <input type="text" th:field="*{fullName}" placeholder="John Doe" required/>
      </div>
      <div class="field-error" th:errors="*{fullName}"></div>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Email *</label>
        <div class="input-wrap"><span>✉️</span>
          <input type="email" th:field="*{email}" placeholder="you@example.com" required/>
        </div>
        <div class="field-error" th:errors="*{email}"></div>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <div class="input-wrap"><span>🔒</span>
          <input type="password" th:field="*{password}" placeholder="Min 6 characters" minlength="6" required/>
        </div>
        <div class="field-error" th:errors="*{password}"></div>
      </div>
    </div>

    <div class="section-label" style="margin-top:8px">Personal Details (optional)</div>
    <div class="row">
      <div class="form-group">
        <label>Organization</label>
        <div class="input-wrap"><span>🏢</span>
          <input type="text" th:field="*{organization}" placeholder="Company / School"/>
        </div>
      </div>
      <div class="form-group">
        <label>Department</label>
        <div class="input-wrap"><span>🏷️</span>
          <input type="text" th:field="*{department}" placeholder="e.g. Computer Science"/>
        </div>
      </div>
    </div>

    <button type="submit" class="btn">Create Account →</button>
  </form>

  <div class="links">Already have an account? <a th:href="@{/login}">Sign in</a></div>
</div>
</body>
</html>
