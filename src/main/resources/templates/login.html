<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Login – ID Card System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0f3460;--accent:#00b4d8;--accent2:#0077b6;
  --bg:#f0f4f8;--white:#fff;--text:#1a1a2e;--muted:#64748b;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:700px;height:700px;background:radial-gradient(circle,rgba(0,180,216,.15) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-30%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,119,182,.12) 0%,transparent 70%);pointer-events:none}
.card{background:var(--white);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.1);position:relative;z-index:1;animation:slideUp .5s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--navy),var(--accent));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,180,216,.3)}
.logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text)}
.logo p{font-size:13px;color:var(--muted);margin-top:4px}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px}
.alert-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.form-group{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px}
.input-wrap{position:relative}
.input-wrap span{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
input{width:100%;padding:13px 14px 13px 42px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;background:#fafafa}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,180,216,.1);background:#fff}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--navy),var(--accent2));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:4px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,119,182,.35)}
.btn:active{transform:translateY(0)}
.links{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
.links a{color:var(--accent2);text-decoration:none;font-weight:500}
.links a:hover{text-decoration:underline}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.admin-btn{display:block;text-align:center;padding:12px;border:2px solid #e2e8f0;border-radius:12px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:all .2s}
.admin-btn:hover{border-color:var(--navy);color:var(--navy);background:#f8fafc}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🪪</div>
    <h1>Welcome Back</h1>
    <p>Sign in to ID Card System</p>
  </div>

  <div th:if="${param.error}" class="alert alert-danger">❌ Invalid email or password.</div>
  <div th:if="${param.logout}" class="alert alert-success">✅ Logged out successfully.</div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap"><span>✉️</span>
        <input type="email" name="username" placeholder="you@example.com" required autofocus/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap"><span>🔒</span>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>

  <div class="divider">or</div>
  <a th:href="@{/admin/login}" class="admin-btn">🔐 Admin Portal Login</a>

  <div class="links" style="margin-top:20px">
    Don't have an account? <a th:href="@{/register}">Register here</a>
  </div>
</div>
</body>
</html>
